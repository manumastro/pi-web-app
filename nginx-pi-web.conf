# /etc/nginx/sites-available/pi-web
# Reverse proxy per Pi Web App con supporto SSE

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name 161.97.116.63;

    # Pi Web App
    location /pi-web/ {
        proxy_pass http://127.0.0.1:3210/;  # Strip /pi-web prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support - no Upgrade header needed but keep for compatibility
        proxy_set_header Connection '';
        
        # Timeouts per SSE
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        
        # Disable buffering for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        
        #必要头
        proxy_set_header X-Accel-Buffering no;
    }
}
