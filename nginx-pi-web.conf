# /etc/nginx/sites-available/pi-web
# Reverse proxy per Pi Web App con supporto WebSocket

map $http_upgrade $connection_upgrade_pi {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name 161.97.116.63;  # Cambia con il tuo dominio se ne hai uno

    # Pi Web App
    location /pi-web/ {
        proxy_pass http://127.0.0.1:3210/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_pi;
        
        # Timeouts lunghi per connessioni WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        
        # Disable buffering for streaming
        proxy_buffering off;
    }
}
